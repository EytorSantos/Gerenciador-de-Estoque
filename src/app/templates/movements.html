<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentações | Farmácia Stock</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <a href="/dashboard.html" class="logo">
            <i class="fas fa-prescription-bottle-alt"></i> Farmácia Stock
        </a>
        <nav class="nav-links">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/medications.html">Medicamentos</a>
            <a href="/quick-search.html">Consulta Rápida</a>
            <a href="/movements.html" class="active">Movimentações</a>
            <a href="/profile.html">Perfil</a>
            <a href="#" id="logout-btn" class="btn btn-outline" style="padding: 0.4rem 1rem;">Sair</a>
        </nav>
    </div>

    <div class="container">
        <div class="page-header">
            <div>
                <h1>Movimentações de Estoque</h1>
                <p style="color: var(--text-muted);">Histórico completo de entradas e saídas (Kardex).</p>
            </div>
            <a href="/new-movement.html" class="btn btn-primary">
                <i class="fas fa-exchange-alt"></i> Nova Movimentação
            </a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Data / Hora</th>
                        <th>Medicamento</th>
                        <th>Lote</th>
                        <th>Tipo</th>
                        <th>Qtd.</th>
                        <th>Usuário</th>
                    </tr>
                </thead>
                <tbody id="movements-table-body">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
            <div id="no-movements-message" style="display: none; padding: 2rem; text-align: center; color: var(--text-muted);">
                <i class="fas fa-history" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></i>
                Nenhuma movimentação encontrada.
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <div id="loading-overlay" class="loading-overlay" style="display: none;">Carregando...</div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/movements.js"></script>
</body>
</html>
