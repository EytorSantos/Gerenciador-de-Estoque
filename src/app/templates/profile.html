<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | Farmácia Stock</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .avatar-circle {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/dashboard.html" class="logo">
            <i class="fas fa-prescription-bottle-alt"></i> Farmácia Stock
        </a>
        <nav class="nav-links">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/medications.html">Medicamentos</a>
            <a href="/quick-search.html">Consulta Rápida</a>
            <a href="/movements.html">Movimentações</a>
            <a href="/profile.html" class="active">Perfil</a>
            <a href="#" id="logout-btn" class="btn btn-outline" style="padding: 0.4rem 1rem;">Sair</a>
        </nav>
    </div>

    <div class="container">
        <div class="profile-container">
            <div class="profile-header">
                <div class="avatar-circle" id="avatar-initials">U</div>
                <h1 id="display-name">Carregando...</h1>
                <p id="display-role" class="badge badge-success">Cargo</p>
            </div>

            <div class="card">
                <h3 class="card-title"><i class="fas fa-user-edit"></i> Informações Pessoais</h3>
                <form id="profile-form">
                    <div class="form-group">
                        <label for="username">Nome de Usuário</label>
                        <input type="text" id="username" name="username" readonly style="background: #f8fafc; cursor: not-allowed;">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail Corporativo</label>
                        <input type="email" id="email" name="email" readonly style="background: #f8fafc; cursor: not-allowed;">
                    </div>
                    <div class="form-group">
                        <label for="full_name">Nome Completo</label>
                        <input type="text" id="full_name" name="full_name" placeholder="Digite seu nome completo">
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">
                    </div>
                    <div id="crm-group" class="form-group" style="display: none;">
                        <label for="crm">CRF (Registro Farmacêutico)</label>
                        <input type="text" id="crm" name="crm" placeholder="Número do registro">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                        <i class="fas fa-save"></i> Atualizar Perfil
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <div id="loading-overlay" class="loading-overlay" style="display: none;">Carregando...</div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/profile.js"></script>
</body>
</html>
