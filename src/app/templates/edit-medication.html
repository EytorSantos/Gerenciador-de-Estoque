<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Medicamento | Farmácia Stock</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-card { max-width: 800px; margin: 0 auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/dashboard.html" class="logo">
            <i class="fas fa-prescription-bottle-alt"></i> Farmácia Stock
        </a>
        <nav class="nav-links">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/medications.html" class="active">Medicamentos</a>
            <a href="/quick-search.html">Consulta Rápida</a>
            <a href="/movements.html">Movimentações</a>
            <a href="/profile.html">Perfil</a>
            <a href="#" id="logout-btn" class="btn btn-outline" style="padding: 0.4rem 1rem;">Sair</a>
        </nav>
    </div>

    <div class="container">
        <div class="form-card card">
            <h1 style="margin-bottom: 0.5rem;"><i class="fas fa-edit" style="color: var(--primary);"></i> Editar Medicamento</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Atualize os dados técnicos do produto.</p>
            
            <form id="edit-medication-form">
                <input type="hidden" id="medication-id" name="id">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="barcode">Código de Barras</label>
                        <input type="text" id="barcode" name="barcode" required minlength="5" maxlength="50">
                    </div>
                    <div class="form-group">
                        <label for="name">Nome Comercial</label>
                        <input type="text" id="name" name="name" required minlength="2" maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="active_principle">Princípio Ativo</label>
                        <input type="text" id="active_principle" name="active_principle" required minlength="2" maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="dosage">Dosagem</label>
                        <input type="text" id="dosage" name="dosage" required minlength="1" maxlength="50">
                    </div>
                    <div class="form-group">
                        <label for="manufacturer">Fabricante / Laboratório</label>
                        <input type="text" id="manufacturer" name="manufacturer" required minlength="2" maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="tarja">Tipo de Tarja</label>
                        <select id="tarja" name="tarja" required>
                            <option value="livre">Livre (Venda Isenta)</option>
                            <option value="amarela">Amarela (Genérico)</option>
                            <option value="vermelha">Vermelha (Sob Prescrição)</option>
                            <option value="preta">Preta (Controle Especial)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="price">Preço Unitário (R$)</label>
                        <input type="number" id="price" name="price" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="min_stock">Estoque Mínimo (Alerta)</label>
                        <input type="number" id="min_stock" name="min_stock" min="0" required>
                    </div>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex-grow: 1; justify-content: center;">
                        <i class="fas fa-save"></i> Salvar Alterações
                    </button>
                    <a href="/medications.html" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>
    <div id="loading-overlay" class="loading-overlay" style="display: none;">Carregando...</div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/edit-medication.js"></script>
</body>
</html>
